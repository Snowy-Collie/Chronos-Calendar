<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title data-i18n="title">時光倒數曆</title>
  <link rel="stylesheet" href="/static/css/shared.css">
  <link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
  <!-- Ambient Glows -->
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>

  <div class="mobile-app">
    <!-- Top Navigation Header -->
    <header class="mobile-header glass">
      <div class="brand">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--primary)" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span class="mobile-logo-text" data-i18n="title">時光倒數曆</span>
      </div>
      
      <!-- Compact Language Button -->
      <div class="mobile-lang-trigger glass-card" id="lang-trigger-btn">
        <span id="current-lang-text">繁中</span>
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
    </header>

    <!-- Collapsible Calendar Drawer -->
    <section class="calendar-drawer glass">
      <div class="drawer-header" id="calendar-drawer-toggle">
        <span id="mobile-month-year" class="month-title">June 2026</span>
        <svg id="drawer-arrow" class="drawer-arrow" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
      
      <div class="calendar-body" id="calendar-drawer-body" style="display: none;">
        <div class="drawer-controls">
          <button id="mobile-prev-month" class="mobile-nav-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"></path></svg>
          </button>
          <button id="mobile-next-month" class="mobile-nav-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"></path></svg>
          </button>
        </div>
        <div class="calendar-weekdays" id="mobile-weekdays"></div>
        <div class="calendar-days" id="mobile-days"></div>
        <div class="cleanup-notice" data-i18n="autoCleanNotice">* 過去超過 16 天的事件將會被自動清理</div>
      </div>
    </section>

    <!-- Scrollable Events List -->
    <main class="events-section">
      <div id="mobile-events-container" class="mobile-events-feed">
        <!-- Cards populated by JS -->
      </div>
      
      <!-- Empty state -->
      <div id="mobile-empty-state" class="mobile-empty-state glass">
        <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="var(--text-muted)" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <p data-i18n="noEvents">暫無事件，快去創建一個吧！</p>
      </div>
    </main>

    <!-- Floating Action Button (FAB) -->
    <button id="mobile-fab" class="mobile-fab">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="3">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>
  </div>

  <!-- Language Selection Sheet (Bottom Sheet) -->
  <div id="lang-sheet" class="sheet-overlay">
    <div class="sheet-content glass">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h4 data-i18n="title">選擇語言</h4>
      </div>
      <div class="lang-options">
        <button class="lang-option-btn" data-lang="zh">國語 (繁體中文)</button>
        <button class="lang-option-btn" data-lang="en">English</button>
        <button class="lang-option-btn" data-lang="ja">日本語</button>
      </div>
    </div>
  </div>

  <!-- Event Editor Bottom Sheet -->
  <div id="event-sheet" class="sheet-overlay">
    <div class="sheet-content glass event-sheet-content">
      <div class="sheet-handle"></div>
      
      <div class="sheet-header">
        <h3 id="sheet-title" data-i18n="addEvent">添加事件</h3>
        <button id="close-sheet-btn" class="sheet-close-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <form id="mobile-event-form" class="sheet-form">
        <input type="hidden" id="m-event-id">
        
        <!-- Title -->
        <div class="form-group">
          <label for="m-event-title-input" data-i18n="eventTitle">事件名稱</label>
          <input type="text" id="m-event-title-input" required data-i18n-placeholder="eventTitlePlaceholder" placeholder="例如：我的生日">
        </div>

        <!-- Date & Time -->
        <div class="form-group">
          <label for="m-event-date-input" data-i18n="eventTime">日期與時間</label>
          <div class="m-datetime-row">
            <input type="date" id="m-event-date-input" required>
            <input type="time" id="m-event-time-input" step="1">
          </div>
          
          <label class="checkbox-container" style="margin-top: 8px;">
            <input type="checkbox" id="m-event-allday-checkbox">
            <span class="checkmark"></span>
            <span data-i18n="allDay">全天事件</span>
          </label>
        </div>

        <!-- Enable Countdown Toggle -->
        <div class="form-group">
          <label class="checkbox-container">
            <input type="checkbox" id="m-event-countdown-checkbox" checked>
            <span class="checkmark"></span>
            <span data-i18n="countdownToggle">開啟倒數計時</span>
          </label>
        </div>

        <!-- Settings Container -->
        <div id="m-countdown-settings-section" class="m-settings-section">
          <!-- Background Upload -->
          <div class="form-group">
            <label data-i18n="bgImage">背景圖片</label>
            <div class="m-upload-zone" id="m-upload-zone">
              <input type="file" id="m-bg-file-input" accept="image/*" style="display: none;">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--primary)" stroke-width="2" style="margin-bottom: 4px;">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
              <span class="m-upload-text" data-i18n="uploadPlaceholder">點擊上傳背景圖</span>
              
              <div id="m-upload-preview" class="m-upload-preview" style="display: none;">
                <img id="m-preview-img" src="" alt="preview">
                <button type="button" id="m-remove-bg-btn" class="m-btn-remove-bg">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
              </div>
            </div>
            <input type="hidden" id="m-event-bg-image">
          </div>

          <!-- Overlay Styling: Effect, Opacity & Color -->
          <div class="m-form-row">
            <div class="form-group">
              <label for="m-event-bg-effect" data-i18n="bgEffect">效果</label>
              <select id="m-event-bg-effect">
                <option value="normal" data-i18n="effectNormal">正常</option>
                <option value="glass" data-i18n="effectGlass">毛玻璃</option>
              </select>
            </div>
            <div class="form-group">
              <label for="m-event-bg-color" data-i18n="bgColor">顏色</label>
              <input type="color" id="m-event-bg-color" value="#1e1e2e" style="padding: 0; width: 100%; height: 44px; border-radius: 8px;">
            </div>
          </div>

          <div class="form-group">
            <label for="m-event-bg-opacity" data-i18n="opacity">背景不透明度</label>
            <div class="m-range-row">
              <input type="range" id="m-event-bg-opacity" min="0" max="100" value="100">
              <span id="m-opacity-val">100%</span>
            </div>
          </div>

          <!-- Time Units -->
          <div class="form-group">
            <label data-i18n="displayUnits">時間單位</label>
            <div class="m-units-row">
              <label class="checkbox-container">
                <input type="checkbox" class="m-unit-checkbox" value="y" checked>
                <span class="checkmark"></span>
                <span data-i18n="yearsShort">年</span>
              </label>
              <label class="checkbox-container">
                <input type="checkbox" class="m-unit-checkbox" value="d" checked>
                <span class="checkmark"></span>
                <span data-i18n="daysShort">天</span>
              </label>
              <label class="checkbox-container">
                <input type="checkbox" class="m-unit-checkbox" value="h" checked>
                <span class="checkmark"></span>
                <span data-i18n="hoursShort">時</span>
              </label>
              <label class="checkbox-container">
                <input type="checkbox" class="m-unit-checkbox" value="m" checked>
                <span class="checkmark"></span>
                <span data-i18n="minutesShort">分</span>
              </label>
              <label class="checkbox-container">
                <input type="checkbox" class="m-unit-checkbox" value="s" checked>
                <span class="checkmark"></span>
                <span data-i18n="secondsShort">秒</span>
              </label>
            </div>
          </div>

          <!-- Countdown Template -->
          <div class="form-group">
            <label for="m-event-template-input" data-i18n="displayTemplate">倒數內容模板</label>
            <input type="text" id="m-event-template-input" required value="[title] 還有 [d] 天">
            
            <div class="m-template-tags">
              <button type="button" class="m-tag-btn" data-tag="[title]">[title]</button>
              <button type="button" class="m-tag-btn" data-tag="[y]">[y]</button>
              <button type="button" class="m-tag-btn" data-tag="[d]">[d]</button>
              <button type="button" class="m-tag-btn" data-tag="[h]">[h]</button>
              <button type="button" class="m-tag-btn" data-tag="[m]">[m]</button>
              <button type="button" class="m-tag-btn" data-tag="[s]">[s]</button>
              <button type="button" class="m-tag-btn" id="m-reset-template-btn">Reset</button>
            </div>
          </div>
        </div>

        <!-- Save/Cancel Drawer Actions -->
        <div class="m-form-actions">
          <button type="button" id="m-delete-event-btn" class="m-btn-danger" style="display: none;" data-i18n="delete">刪除</button>
          <div style="margin-left: auto; display: flex; gap: 8px;">
            <button type="button" id="m-cancel-sheet-btn" class="btn-secondary" data-i18n="cancel">取消</button>
            <button type="submit" class="btn-primary" data-i18n="save">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast system -->
  <div id="m-toast-container" class="m-toast-container"></div>

  <!-- Shared JS scripts -->
  <script src="/static/js/countdown_parser.js"></script>
  <script src="/static/js/i18n.js"></script>
  <!-- Mobile JS script -->
  <script src="/static/js/mobile.js"></script>
</body>
</html>
