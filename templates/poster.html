<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ texts.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d0e15;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-color: #f4f4f7;
      --text-muted: #a0a0b0;
      --accent: #ff79c6;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Back Button styled as a beautiful glass pill */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      border-radius: 50px;
      color: var(--text-color);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    }

    .back-btn:active {
      transform: translateY(0);
    }

    .back-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* Poster Container */
    .poster-container {
      position: relative;
      max-width: 100%;
      max-height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 40px;
      margin-bottom: 20px;
      animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .poster-image {
      max-width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease;
    }

    .poster-image:hover {
      transform: scale(1.01);
    }

    /* Instructions / Tips Box */
    .tip-box {
      text-align: center;
      margin-top: 10px;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tip-icon {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 6px;
      color: var(--accent);
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    .tip-text {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text-color);
    }

    .tip-sub {
      margin-top: 4px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Mobile specific tweaks */
    @media (max-width: 768px) {
      body {
        padding: 15px;
      }
      .back-btn {
        top: 15px;
        left: 15px;
        padding: 8px 16px;
        font-size: 14px;
      }
      .poster-container {
        margin-top: 50px;
        max-height: 70vh;
      }
      .poster-image {
        max-height: 65vh;
        border-radius: 12px;
      }
      .tip-box {
        padding: 10px 16px;
      }
      .tip-text {
        font-size: 14px;
      }
      .tip-sub {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Floating Back Button -->
  <a href="javascript:history.back()" class="back-btn" id="back-button">
    <svg viewBox="0 0 24 24">
      <path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/>
    </svg>
    <span>{{ texts.back }}</span>
  </a>

  <!-- Poster Image Display -->
  <div class="poster-container">
    <img src="/api/generate_poster/{{ event_id }}?lang={{ lang }}&format={{ format }}" alt="Countdown Poster" class="poster-image" id="poster-img">
  </div>

  <!-- Instruction Tip -->
  <div class="tip-box">
    <div class="tip-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </div>
    <p class="tip-text" id="tip-desc"></p>
    <p class="tip-sub" id="tip-subtext"></p>
  </div>

  <script>
    // Detect mobile or desktop to show proper prompt text
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const tipDesc = document.getElementById('tip-desc');
    const tipSub = document.getElementById('tip-subtext');

    if (isMobile) {
      tipDesc.textContent = "{{ texts.tip_mobile }}";
      tipSub.textContent = "{{ '長按圖片後選擇「加入照片」或「保存圖片」' if lang == 'zh' else ('画像を長押しして「写真に追加」または「画像を保存」を選択します' if lang == 'ja' else 'Long press the image and select \"Save Image\"') }}";
    } else {
      tipDesc.textContent = "{{ texts.tip_desktop }}";
      tipSub.textContent = "{{ '右鍵點擊圖片後選擇「圖片另存為...」' if lang == 'zh' else ('画像を右クリックして「名前を付けて画像を保存...」を選択します' if lang == 'ja' else 'Right click on the image and select \"Save Image As...\"') }}";
    }
  </script>
</body>
</html>
